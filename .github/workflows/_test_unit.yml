name: xxxxx(internal)

on:
  workflow_call:
    inputs:
      packages:
        description: Comma-separated package paths to test
        type: string
      excludePackages:
        description: Comma-separated package paths to exclude from testing
        type: string
      coverage:
        default: false
        type: string
      forceSkip:
        default: false
        type: string

defaults:
  run:
    shell: bash

env:
  DEBIAN_FRONTEND: "noninteractive"

jobs:
  _:
    if: inputs.forceSkip == 'false'
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git config
        uses: ./.github/actions/set-up-git-config

      # TODO: don't build ginkgo everytime? We need distributable binaries
      - name: Install ginkgo
        run: task -p deps:install:ginkgo

      - name: Prepare coverage dir
        if: ${{ inputs.coverage }}
        run: mkdir -p "$GITHUB_WORKSPACE/coverage"

      - name: Test
        run: |
          if ${{ inputs.coverage }}; then
            task -p test:unit paths="$(echo ${{ inputs.packages }} | tr , ' ')" skipPackage="${{ inputs.excludePackages }}" -- --coverprofile="$(openssl rand -hex 6)-coverage.out" --keep-going
            mv *-coverage.out "$GITHUB_WORKSPACE/coverage/"
          else
            task -p test:unit paths="$(echo ${{ inputs.packages }} | tr , ' ')" skipPackage="${{ inputs.excludePackages }}" -- --keep-going
          fi
          echo loadavg: $(cat /proc/loadavg)

      - name: Upload coverage artifact
        uses: ./.github/actions/upload-coverage-artifact
        with:
          coverage: ${{ inputs.coverage }}
